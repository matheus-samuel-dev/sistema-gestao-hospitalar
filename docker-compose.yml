name: sistema-gestao-hospitalar

services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-gestao-hospitalar-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare} -d ${POSTGRES_DB:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sistema-gestao-hospitalar-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/healthcare}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-healthcare}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-healthcare}
      JWT_SECRET: ${JWT_SECRET:-healthcare-portfolio-secret-key-with-512-bits-minimum-for-jjwt-security}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: sistema-gestao-hospitalar-web
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
